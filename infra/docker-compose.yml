services:
  db:
    image: postgis/postgis:16-3.4
    container_name: social-plans-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plansocial}
      POSTGRES_USER: ${POSTGRES_USER:-plansocial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plansocial}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plansocial} -d ${POSTGRES_DB:-plansocial}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: social-plans-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
